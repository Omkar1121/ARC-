<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Portfolio | Your Name</title>
  <meta name="description" content="Personal portfolio website" />
  <style>
    :root {
      --bg: #0b1020;
      --panel: rgba(255, 255, 255, 0.08);
      --panel-strong: rgba(255, 255, 255, 0.12);
      --text: #f5f7fb;
      --muted: #b7c0d1;
      --accent: #6ee7f9;
      --accent-2: #8b5cf6;
      --border: rgba(255, 255, 255, 0.12);
      --shadow: 0 10px 30px rgba(0, 0, 0, 0.25);
      --radius: 20px;
      --maxw: 1100px;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(110, 231, 249, 0.12), transparent 30%),
        radial-gradient(circle at top right, rgba(139, 92, 246, 0.15), transparent 25%),
        linear-gradient(180deg, #0b1020 0%, #11172b 100%);
      line-height: 1.6;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    img {
      max-width: 100%;
      display: block;
    }

    .container {
      width: min(92%, var(--maxw));
      margin: 0 auto;
    }

    .glass {
      background: var(--panel);
      border: 1px solid var(--border);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      box-shadow: var(--shadow);
      border-radius: var(--radius);
    }

    .section {
      padding: 80px 0;
    }

    .section-title {
      font-size: clamp(1.7rem, 2.5vw, 2.4rem);
      margin-bottom: 12px;
      letter-spacing: 0.2px;
    }

    .section-subtitle {
      color: var(--muted);
      margin-bottom: 28px;
      max-width: 700px;
    }

    /* Header */
    header {
      position: sticky;
      top: 0;
      z-index: 1000;
      background: rgba(11, 16, 32, 0.72);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }

    .nav {
      min-height: 70px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
    }

    .brand {
      font-weight: 700;
      font-size: 1.05rem;
      letter-spacing: 0.3px;
    }

    .brand span {
      color: var(--accent);
    }

    .nav-links {
      display: flex;
      gap: 18px;
      flex-wrap: wrap;
    }

    .nav-links a {
      color: var(--muted);
      font-size: 0.95rem;
      transition: 0.25s ease;
    }

    .nav-links a:hover {
      color: var(--text);
    }

    /* Hero */
    .hero {
      padding: 70px 0 40px;
    }

    .hero-grid {
      display: grid;
      grid-template-columns: 1.3fr 0.9fr;
      gap: 28px;
      align-items: center;
    }

    .hero-card {
      padding: 34px;
    }

    .eyebrow {
      display: inline-block;
      color: var(--accent);
      font-weight: 600;
      font-size: 0.95rem;
      margin-bottom: 12px;
    }

    .hero h1 {
      font-size: clamp(2.2rem, 5vw, 4rem);
      line-height: 1.08;
      margin-bottom: 16px;
    }

    .hero p {
      color: var(--muted);
      max-width: 640px;
      margin-bottom: 24px;
      font-size: 1.02rem;
    }

    .cta-row {
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 12px 18px;
      border-radius: 999px;
      font-weight: 600;
      transition: 0.25s ease;
      border: 1px solid transparent;
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      color: #0b1020;
    }

    .btn-primary:hover {
      transform: translateY(-1px);
      filter: brightness(1.05);
    }

    .btn-secondary {
      border-color: var(--border);
      color: var(--text);
      background: rgba(255,255,255,0.04);
    }

    .btn-secondary:hover {
      background: rgba(255,255,255,0.08);
    }

    .profile-card {
      padding: 24px;
    }

    .photo-placeholder {
      aspect-ratio: 1 / 1;
      width: 100%;
      border-radius: 24px;
      border: 1px dashed rgba(255,255,255,0.22);
      display: grid;
      place-items: center;
      color: var(--muted);
      background:
        linear-gradient(135deg, rgba(110,231,249,0.08), rgba(139,92,246,0.08));
      text-align: center;
      padding: 24px;
      font-weight: 600;
    }

    .quick-info {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
      margin-top: 16px;
    }

    .quick-info div {
      padding: 14px;
      border-radius: 16px;
      background: var(--panel-strong);
      border: 1px solid var(--border);
    }

    .quick-info strong {
      display: block;
      font-size: 0.92rem;
      margin-bottom: 4px;
    }

    .quick-info span {
      color: var(--muted);
      font-size: 0.92rem;
    }

    /* About */
    .about-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 24px;
    }

    .card {
      padding: 26px;
    }

    .card h3 {
      font-size: 1.15rem;
      margin-bottom: 12px;
    }

    .card p,
    .card li {
      color: var(--muted);
    }

    .highlights {
      display: grid;
      gap: 12px;
      list-style: none;
    }

    .highlights li {
      padding: 14px 16px;
      border: 1px solid var(--border);
      border-radius: 14px;
      background: rgba(255,255,255,0.03);
    }

    /* Skills */
    .skill-list {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
    }

    .skill-tag {
      padding: 10px 14px;
      border-radius: 999px;
      background: rgba(255,255,255,0.06);
      border: 1px solid var(--border);
      color: var(--text);
      font-size: 0.95rem;
    }

    /* Experience */
    .timeline {
      display: grid;
      gap: 18px;
    }

    .timeline-item {
      padding: 22px;
      border-radius: 18px;
      border: 1px solid var(--border);
      background: rgba(255,255,255,0.04);
    }

    .timeline-top {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      flex-wrap: wrap;
      margin-bottom: 10px;
    }

    .timeline-top h3 {
      font-size: 1.08rem
